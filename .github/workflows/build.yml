name: Build
# Tests runs different tests.
# This workflow runs on every push to main or release branch and  every pull requests
# All jobs will pass without running if no *{.go, .mod, .sum} files have been modified
on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64, runs-on: ubuntu-latest }
          - { goos: linux, goarch: arm64, runs-on: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - '**/*.go'
              - 'Makefile'
              - 'go.*'
              - '.github/workflows/build.yml'

      - run: echo "GO_VERSION=$(cat .github/workflows/go-version.env | grep GO_VERSION | cut -d '=' -f2)" >> $GITHUB_ENV
        if: steps.filter.outputs.code == 'true' && hashFiles('go.mod') != ''

      - uses: actions/setup-go@v6
        if: steps.filter.outputs.code == 'true'
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build kms
        if: steps.filter.outputs.code == 'true' && hashFiles('go.mod') != ''
        run: make build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Upload kms binary
        if: steps.filter.outputs.code == 'true' && hashFiles('go.mod') != ''
        uses: actions/upload-artifact@v7
        with:
          name: kms-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/kms
          if-no-files-found: error
