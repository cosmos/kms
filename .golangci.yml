version: "2"
linters:
  enable:
    - asciicheck
    - bodyclose
    - copyloopvar
    - depguard
    - dogsled
    - dupl
    - goconst
    - gocritic
    - misspell
    - nakedret
    - nolintlint
    - staticcheck
    - unconvert
    - unused
  settings:
    depguard:
      rules:
        main:
          files:
            - $all
            - '!$test'
          allow:
            - $gostd
            - github.com/cosmos/kms
            - github.com/cometbft/cometbft
            - github.com/libp2p/go-libp2p
            - github.com/miekg/pkcs11
            - github.com/aws/aws-sdk-go-v2
            - github.com/BurntSushi/toml
            - github.com/spf13/cobra
            - github.com/stretchr/testify
            - github.com/decred/dcrd/dcrec/secp256k1
        test:
          files:
            - $test
          allow:
            - $gostd
            - github.com/cosmos/kms
            - github.com/cometbft/cometbft
            - github.com/libp2p/go-libp2p
            - github.com/miekg/pkcs11
            - github.com/aws/aws-sdk-go-v2
            - github.com/BurntSushi/toml
            - github.com/spf13/cobra
            - github.com/stretchr/testify
            - github.com/decred/dcrd/dcrec/secp256k1
    dogsled:
      max-blank-identifiers: 3
    gosec:
      excludes:
        - G115
    misspell:
      locale: US
    revive:
      enable-all-rules: true
      rules:
        - name: comment-spacings
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: argument-limit
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: deep-exit
          disabled: true
        - name: file-header
          disabled: true
        - name: function-length
          disabled: true
        - name: function-result-limit
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: add-constant
          disabled: true
        - name: empty-lines
          disabled: true
        - name: import-shadowing
          disabled: true
        - name: modifies-value-receiver
          disabled: true
        - name: confusing-naming
          disabled: true
        - name: defer
          disabled: true
        - name: unchecked-type-assertion
          disabled: true
        - name: unhandled-error
          arguments:
            - fmt.Printf
            - fmt.Print
            - fmt.Println
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: _test\.go
      - linters:
          - goconst
        path: (.+)_test\.go
      - linters:
          - dupl
        path: (.+)_test\.go
      - linters:
          - govet
        text: "buildtag:"
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 50
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
