syntax = "proto3";

package cosmos.kms.signerservice;

option go_package = "github.com/cosmos/kms/gen/signerservice";

service SignerService {
    rpc GetKey(GetKeyRequest) returns (GetKeyResponse) {}
    rpc GetKeys(GetKeysRequest) returns (GetKeysResponse) {}
    rpc Sign(SignRequest) returns (SignResponse) {}
}

message Key {
    string id = 1;
    bytes pubkey = 2;
    string algo = 3;
}

message GetKeyRequest {
    string id = 1;
}

message GetKeyResponse {
    Key key = 1;
}

message GetKeysRequest {}

message GetKeysResponse {
    repeated Key keys = 1;
}

message SignRequest {
    string key_id = 1;
    oneof payload {
        EvmTransaction evm_transaction = 2;
        CosmosTransaction cosmos_transaction = 3;
        RawMessage raw_message = 4;
        SolanaTransaction solana_transaction = 5;
        RecoverableMessage recoverable_message = 6;
    }
}

message SignResponse {
    oneof signature {
        EvmTransactionSignature evm_signature = 1;
        CosmosTransactionSignature cosmos_signature = 2;
        RawMessageSignature raw_signature = 3;
        SolanaTransactionSignature solana_signature = 4;
        RecoverableMessageSignature recoverable_signature = 5;
    }
}

message EvmTransaction {
    string chain_id = 1;
    bytes tx_bytes = 2;
}

message EvmTransactionSignature {
    bytes r = 1;
    bytes s = 2;
    bytes v = 3;
}

message CosmosTransaction {
    bytes sign_doc_bytes = 1;
}

message CosmosTransactionSignature {
    bytes signature = 1;
}

message RawMessage {
    bytes message = 1;
}

message RawMessageSignature {
    bytes signature = 1;
}

message SolanaTransactionSignature {
    bytes signature = 1;
}

message SolanaTransaction {
    string transaction = 1; // Base-64 encoded transaction
}

message RecoverableMessage {
    bytes message = 1;
}

message RecoverableMessageSignature {
    bytes r = 1;
    bytes s = 2;
    bytes v = 3;
}
